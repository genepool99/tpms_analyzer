name: TireSignal
version: "0.3.13"
slug: tpms_analyzer
description: Home Assistant-friendly TPMS monitoring and analysis powered by rtl_433.
url: https://github.com/genepool99/tiresignal
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: manual
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:car-tire-alert
panel_title: TireSignal
panel_admin: true
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Direct web UI access
map:
  - config:rw
options:
  log_path: "/config/rtl_433/logs/rtl_433.jsonl"
  vehicle_map_path: "/data/vehicles.json"
  scheduled_refresh_enabled: true
  scheduled_refresh_time: "03:10"
  # Advanced tuning — safe to leave at defaults for most installs.
  # Disable to keep all sensor events forever (useful for debugging).
  enable_pruning: true
  # Days to retain events from unrecognized sensors before pruning.
  # Increase on quiet roads; lower on busy streets to save disk space.
  unknown_sensor_retention_days: 180
  # Seconds two readings must fall within to be grouped as one pass.
  # Lower values (3-5 s) suit busy roads; higher values (8-15 s) suit driveways.
  pass_window_seconds: 5
  # Minimum number of times a sensor must repeat within a pass window
  # before it is treated as a candidate vehicle sensor (not road noise).
  min_repeat_cluster_count: 3
schema:
  log_path: str
  vehicle_map_path: str
  scheduled_refresh_enabled: bool
  scheduled_refresh_time: str
  enable_pruning: bool
  unknown_sensor_retention_days: int
  pass_window_seconds: int
  min_repeat_cluster_count: int
