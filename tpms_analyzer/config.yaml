name: TPMS Analyzer
version: "0.2.0"
slug: tpms_analyzer
description: Analyzes rtl_433 TPMS sensor data and generates an HTML report.
url: https://github.com/genepool99/tpms_analyzer
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: manual
init: false
ports:
  8099/tcp: 8099
map:
  - config:rw
options:
  log_path: "/config/rtl_433/logs/rtl_433.jsonl"
  vehicle_map_path: "/data/vehicles.json"
schema:
  log_path: str
  vehicle_map_path: str